<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشروع السيارات - يزن شامي</title>
    <style>
        :root { --primary: #1a73e8; --accent: #d93025; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .team-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin: 30px 0; }
        .card { background: #fff; border: 1px solid #ddd; padding: 15px; border-radius: 15px; width: 280px; }
        .card img { width: 100%; height: 250px; object-fit: cover; border-radius: 10px; }
        .grande-tag { background: var(--accent); color: white; padding: 10px; border-radius: 5px; font-weight: bold; display: inline-block; margin-top: 10px; }
        .car-img { width: 100%; max-width: 500px; border-radius: 10px; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to our project</h1>
        <h2>أعضاء المجموعة</h2>
        <div class="team-grid">
            <div class="card">
                <img src="yazan.png" alt="يزن شامي">
                <h3>يزن سليمان شامي</h3>
            </div>
            <div class="card"><h3>سيف عريشي</h3></div>
            <div class="card"><h3>عبدالعزيز شراحيلي</h3></div>
        </div>

        <hr>

        <h2>قسم السيارات</h2>
        <div class="card" style="width: 100%; margin-bottom: 20px;">
            <h3>تويوتا كامري قراندي</h3>
            <img src="camry.png" alt="كامري" class="car-img">
            <p>محرك V6، تكييف جبار، صبورة جداً.</p>
            <div class="grande-tag">"تشم امقاع جيفه"</div>
        </div>

        <div class="card" style="width: 100%; margin-bottom: 20px;">
            <h3>كيا K5</h3>
            <img src="k5.png" alt="كيا" class="car-img">
            <p>تصميم رياضي عصري وتقنيات حديثة.</p>
        </div>

        <div class="card" style="width: 100%; margin-bottom: 20px;">
            <h3>تويوتا هايلوكس</h3>
            <img src="hilux.png" alt="هايلوكس" class="car-img">
            <p>دفع خلفي، صلبة للمهام الشاقة.</p>
        </div>
    </div>
</body>
</html>
