<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشروع مادة السيارات - يزن شامي</title>
    <style>
        :root {
            --primary: #1a73e8;
            --accent: #d93025;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --text: #202124;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 0;
            color: var(--text);
            line-height: 1.6;
        }
        .main-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        header {
            text-align: center;
            background: var(--primary);
            color: white;
            padding: 60px 20px;
            border-radius: 20px;
            margin-bottom: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 { margin: 0; font-size: 3em; }
        .sub-header { font-size: 1.2em; opacity: 0.9; margin-top: 10px; }
        
        .section-title { text-align: center; margin-bottom: 40px; font-size: 2.2em; color: var(--text); }
        .section-title::after { content: ''; display: block; width: 80px; height: 4px; background: var(--primary); margin: 10px auto 0; border-radius: 2px; }
        
        .team-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-bottom: 70px;
        }
        .team-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
            transition: all 0.3s ease;
        }
        .team-card:hover { transform: translateY(-10px); box-shadow: 0 15px 40px rgba(0,0,0,0.1); }
        .team-card img {
            width: 200px;
            height: 280px;
            object-fit: cover;
            border-radius: 15px;
            border: 5px solid #f0f0f0;
            margin-bottom: 20px;
        }
        .member-info h3 { margin: 10px 0; color: var(--primary); }

        .car-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
        }
